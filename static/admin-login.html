<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>后台登录</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f0f2f5;
      color: #333;
    }
    .card {
      width: 92%;
      max-width: 420px;
      background: #fff;
      border-radius: 16px;
      padding: 32px 28px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.08);
    }
    h1 {
      font-size: 22px;
      color: #1a1a2e;
      margin-bottom: 8px;
    }
    p {
      color: #888;
      font-size: 13px;
      margin-bottom: 20px;
    }
    input {
      width: 100%;
      padding: 11px 12px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 14px;
      outline: none;
      background: #fafafa;
    }
    input:focus { border-color: #667eea; background: #fff; }
    button {
      width: 100%;
      border: none;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 15px;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, #667eea, #764ba2);
    }
    .msg {
      margin-top: 10px;
      font-size: 13px;
      min-height: 20px;
      color: #d63031;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>后台管理登录</h1>
    <p>请输入管理密码后进入后台页面</p>
    <form id="loginForm">
      <input id="password" type="password" placeholder="请输入后台密码" autocomplete="off" />
      <button type="submit">登 录</button>
    </form>
    <div class="msg" id="msg"></div>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const msgEl = document.getElementById("msg");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      msgEl.textContent = "";
      const password = document.getElementById("password").value;
      if (!password) {
        msgEl.textContent = "请输入密码";
        return;
      }

      try {
        const res = await fetch("/api/admin/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password }),
        });
        const data = await res.json();
        if (!res.ok || !data.success) {
          msgEl.textContent = data.message || "登录失败";
          return;
        }
        window.location.href = "/admin";
      } catch (err) {
        msgEl.textContent = "网络异常，请稍后重试";
      }
    });
  </script>
</body>
</html>
