<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>作业提交系统</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }

    .card-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .card-header .icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .card-header h1 {
      font-size: 24px;
      color: #1a1a2e;
      font-weight: 700;
    }

    .card-header p {
      color: #888;
      font-size: 14px;
      margin-top: 6px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }

    label span.required {
      color: #e74c3c;
      margin-left: 2px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      color: #333;
      transition: border-color 0.2s;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: #667eea;
    }

    .file-upload-area {
      border: 2px dashed #c5c5c5;
      border-radius: 8px;
      padding: 28px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #fafafa;
    }

    .file-upload-area:hover,
    .file-upload-area.drag-over {
      border-color: #667eea;
      background: #f0eeff;
    }

    .file-upload-area .upload-icon { font-size: 36px; }

    .file-upload-area p {
      color: #888;
      font-size: 13px;
      margin-top: 8px;
    }

    .file-upload-area .file-name {
      margin-top: 10px;
      font-size: 14px;
      color: #667eea;
      font-weight: 600;
      word-break: break-all;
    }

    input[type="file"] { display: none; }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 8px;
    }

    .btn-submit:hover { opacity: 0.92; }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

    /* 结果弹窗 */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .overlay.show { display: flex; }

    .result-box {
      background: #fff;
      border-radius: 16px;
      padding: 36px 32px;
      max-width: 380px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.25);
      animation: pop 0.25s ease;
    }

    @keyframes pop {
      from { transform: scale(0.8); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .result-box .result-icon { font-size: 56px; margin-bottom: 12px; }

    .result-box h2 {
      font-size: 20px;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    .result-box .result-msg {
      color: #555;
      font-size: 14px;
      line-height: 1.6;
    }

    .result-box .submission-id {
      margin-top: 14px;
      background: #f4f4f8;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 13px;
      color: #777;
    }

    .result-box .submission-id strong {
      color: #667eea;
      font-size: 18px;
      display: block;
      margin-top: 4px;
      letter-spacing: 2px;
    }

    .btn-close {
      margin-top: 20px;
      padding: 10px 32px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      font-weight: 600;
    }

    .result-box.error .result-icon::before { content: "❌"; }
    .result-box.success .result-icon::before { content: "✅"; }

    /* 加载动画 */
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 3px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="icon">📄</div>
    <h1>作业提交系统</h1>
    <p>请填写信息并上传 CSV 文件完成提交</p>
  </div>

  <form id="submitForm">
    <div class="form-group">
      <label for="name">姓名<span class="required">*</span></label>
      <input type="text" id="name" placeholder="请输入您的真实姓名" autocomplete="off" />
    </div>

    <div class="form-group">
      <label for="student_id">学号<span class="required">*</span></label>
      <input type="text" id="student_id" placeholder="请输入您的学号" autocomplete="off" />
    </div>

    <div class="form-group">
      <label>CSV 文件<span class="required">*</span></label>
      <div class="file-upload-area" id="uploadArea" onclick="document.getElementById('csvFile').click()">
        <div class="upload-icon">📂</div>
        <p>点击或拖拽 CSV 文件到此处</p>
        <p>仅支持 .csv 格式</p>
        <div class="file-name" id="fileName"></div>
      </div>
      <input type="file" id="csvFile" accept=".csv" />
    </div>

    <button type="submit" class="btn-submit" id="submitBtn">提 交</button>
  </form>
</div>

<!-- 结果弹窗 -->
<div class="overlay" id="overlay">
  <div class="result-box" id="resultBox">
    <div class="result-icon"></div>
    <h2 id="resultTitle"></h2>
    <div class="result-msg" id="resultMsg"></div>
    <div class="submission-id" id="submissionInfo" style="display:none">
      提交编号
      <strong id="submissionId"></strong>
    </div>
    <button class="btn-close" onclick="closeResult()">确 定</button>
  </div>
</div>

<script>
  const uploadArea = document.getElementById("uploadArea");
  const csvFile   = document.getElementById("csvFile");
  const fileName  = document.getElementById("fileName");

  // 文件选择
  csvFile.addEventListener("change", () => {
    if (csvFile.files[0]) {
      fileName.textContent = "已选择：" + csvFile.files[0].name;
    }
  });

  // 拖拽上传
  uploadArea.addEventListener("dragover", e => {
    e.preventDefault();
    uploadArea.classList.add("drag-over");
  });
  uploadArea.addEventListener("dragleave", () => uploadArea.classList.remove("drag-over"));
  uploadArea.addEventListener("drop", e => {
    e.preventDefault();
    uploadArea.classList.remove("drag-over");
    const file = e.dataTransfer.files[0];
    if (file) {
      csvFile.files = e.dataTransfer.files;
      fileName.textContent = "已选择：" + file.name;
    }
  });

  // 表单提交
  document.getElementById("submitForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const name       = document.getElementById("name").value.trim();
    const student_id = document.getElementById("student_id").value.trim();
    const file       = csvFile.files[0];

    if (!name || !student_id || !file) {
      showResult(false, "信息不完整", "请确保姓名、学号和 CSV 文件均已填写/上传。");
      return;
    }

    const btn = document.getElementById("submitBtn");
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>提交中...';

    const formData = new FormData();
    formData.append("name", name);
    formData.append("student_id", student_id);
    formData.append("csv_file", file);

    try {
      const res  = await fetch("/api/submit", { method: "POST", body: formData });
      const data = await res.json();

      if (data.success) {
        showResult(true, "提交成功 🎉", data.message, data.submission_id);
        // 重置表单
        document.getElementById("submitForm").reset();
        fileName.textContent = "";
      } else {
        showResult(false, "提交失败", data.message || "服务器返回错误，请重试。");
      }
    } catch (err) {
      showResult(false, "网络错误", "无法连接到服务器，请检查网络后重试。");
    } finally {
      btn.disabled = false;
      btn.innerHTML = "提 交";
    }
  });

  function showResult(success, title, msg, submissionId) {
    const box   = document.getElementById("resultBox");
    const info  = document.getElementById("submissionInfo");
    box.className = "result-box " + (success ? "success" : "error");
    document.getElementById("resultTitle").textContent = title;
    document.getElementById("resultMsg").textContent   = msg;
    if (success && submissionId) {
      info.style.display = "block";
      document.getElementById("submissionId").textContent = submissionId;
    } else {
      info.style.display = "none";
    }
    document.getElementById("overlay").classList.add("show");
  }

  function closeResult() {
    document.getElementById("overlay").classList.remove("show");
  }
</script>
</body>
</html>
