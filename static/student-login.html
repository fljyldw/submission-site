<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>学生身份验证</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f2f5;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .card {
      width: 92%;
      max-width: 440px;
      background: #fff;
      border-radius: 16px;
      padding: 30px 26px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
    }
    h1 { font-size: 22px; color: #1a1a2e; margin-bottom: 8px; }
    p { font-size: 13px; color: #888; margin-bottom: 18px; }
    input {
      width: 100%;
      padding: 11px 12px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 12px;
      background: #fafafa;
      outline: none;
    }
    input:focus { background: #fff; border-color: #667eea; }
    button {
      width: 100%;
      border: none;
      border-radius: 8px;
      padding: 12px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, #667eea, #764ba2);
    }
    .msg { min-height: 20px; margin-top: 10px; color: #d63031; font-size: 13px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>学生身份验证</h1>
    <p>请输入姓名和学号后继续</p>
    <form id="f">
      <input id="name" placeholder="请输入姓名" autocomplete="off" />
      <input id="student_id" placeholder="请输入学号" autocomplete="off" />
      <button type="submit">进入学生端</button>
    </form>
    <div id="msg" class="msg"></div>
  </div>

  <script>
    document.getElementById("f").addEventListener("submit", async (e) => {
      e.preventDefault();
      const msg = document.getElementById("msg");
      msg.textContent = "";
      const name = document.getElementById("name").value.trim();
      const student_id = document.getElementById("student_id").value.trim();
      if (!name || !student_id) {
        msg.textContent = "姓名和学号不能为空";
        return;
      }
      try {
        const res = await fetch("/api/student/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, student_id }),
        });
        const data = await res.json();
        if (!res.ok || !data.success) {
          msg.textContent = data.message || "校验失败";
          return;
        }
        window.location.href = "/submit";
      } catch (err) {
        msg.textContent = "网络异常，请稍后重试";
      }
    });
  </script>
</body>
</html>
